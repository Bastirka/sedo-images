<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drop Images</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .dropzone {
      border: 2px dashed #666;
      border-radius: 16px;
      padding: 50px 20px;
      text-align: center;
      background: #1a1a1a;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 20px;
    }

    .dropzone:hover,
    .dropzone.dragover {
      border-color: #8b5cf6;
      background: #202020;
    }

    #fileInput {
      display: none;
    }

    .status {
      color: #bbb;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      background: #0d0d0d;
      color: #fff;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 20px;
    }

    .item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      word-break: break-all;
    }

    .preview {
      max-width: 140px;
      max-height: 140px;
      display: block;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    button {
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
    }

    a {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <h1>Image uploader</h1>

  <div id="dropzone" class="dropzone">
    Click here or drop images here
  </div>

  <input id="fileInput" type="file" accept="image/*" multiple />

  <div id="status" class="status">Ready</div>

  <button id="copyAllBtn" type="button">Copy all links</button>

  <textarea id="allLinks" readonly placeholder="Links will appear here..."></textarea>

  <div id="results"></div>

  <script>
    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
    const BUCKET = "photos";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("fileInput");
    const statusEl = document.getElementById("status");
    const allLinksEl = document.getElementById("allLinks");
    const resultsEl = document.getElementById("results");
    const copyAllBtn = document.getElementById("copyAllBtn");

    let allLinks = [];

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function safeFileName(name) {
      const ext = name.includes(".") ? name.slice(name.lastIndexOf(".")) : "";
      const base = name.replace(/\.[^/.]+$/, "");
      const clean = base.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
      return `${clean || "image"}-${Date.now()}-${Math.floor(Math.random() * 10000)}${ext}`;
    }

    function refreshLinks() {
      allLinksEl.value = allLinks.join("\n");
    }

    function addCard(name, url) {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <img src="${url}" class="preview" alt="">
        <div><strong>${name}</strong></div>
        <div style="margin:8px 0;"><a href="${url}" target="_blank">${url}</a></div>
        <button type="button">Copy link</button>
      `;
      div.querySelector("button").addEventListener("click", async () => {
        await navigator.clipboard.writeText(url);
        alert("Copied");
      });
      resultsEl.prepend(div);
    }

    async function uploadFiles(fileList) {
      const files = [...fileList].filter(f => f.type.startsWith("image/"));

      if (!files.length) {
        alert("Choose image files");
        return;
      }

      setStatus(`Uploading ${files.length} file(s)...`);

      for (const file of files) {
        const fileName = safeFileName(file.name);
        const path = `uploads/${fileName}`;

        const { error } = await supabaseClient.storage
          .from(BUCKET)
          .upload(path, file, { cacheControl: "3600", upsert: false });

        if (error) {
          console.error(error);
          setStatus(`Failed: ${file.name}`);
          continue;
        }

        const { data } = supabaseClient.storage.from(BUCKET).getPublicUrl(path);
        const publicUrl = data.publicUrl;

        allLinks.push(publicUrl);
        refreshLinks();
        addCard(file.name, publicUrl);
      }

      setStatus("Done");
    }

    dropzone.addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", async (e) => {
      await uploadFiles(e.target.files);
      fileInput.value = "";
    });

    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.classList.add("dragover");
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.classList.remove("dragover");
    });

    dropzone.addEventListener("drop", async (e) => {
      e.preventDefault();
      dropzone.classList.remove("dragover");
      await uploadFiles(e.dataTransfer.files);
    });

    copyAllBtn.addEventListener("click", async () => {
      if (!allLinks.length) {
        alert("No links yet");
        return;
      }
      await navigator.clipboard.writeText(allLinks.join("\n"));
      alert("All links copied");
    });
  </script>
</body>
</html>
