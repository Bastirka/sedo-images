<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Drop Uploader</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #111;
      color: #fff;
    }

    h1 {
      margin-bottom: 8px;
    }

    p {
      color: #bbb;
      margin-bottom: 20px;
    }

    .dropzone {
      border: 2px dashed #666;
      border-radius: 16px;
      padding: 50px 20px;
      text-align: center;
      background: #1a1a1a;
      transition: 0.2s;
      margin-bottom: 20px;
    }

    .dropzone.dragover {
      border-color: #8b5cf6;
      background: #222;
    }

    .hidden {
      display: none;
    }

    button {
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      margin-right: 10px;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      background: #0d0d0d;
      color: white;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
      margin: 20px 0;
    }

    .item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      word-break: break-all;
    }

    .preview {
      max-width: 140px;
      max-height: 140px;
      display: block;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    a {
      color: #93c5fd;
    }

    .status {
      color: #aaa;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <h1>Drop images here</h1>
  <p>Iemet bildes, un dabūsi gatavus linkus.</p>

  <div id="dropzone" class="dropzone">
    <div>Drag & drop images here</div>
    <div style="margin:12px 0;">or</div>
    <button id="chooseBtn" type="button">Choose files</button>
    <input id="fileInput" class="hidden" type="file" accept="image/*" multiple />
  </div>

  <div class="status" id="status">Ready</div>

  <button id="copyAllBtn" type="button">Copy all links</button>

  <textarea id="allLinks" readonly placeholder="Image links will appear here..."></textarea>

  <div id="results"></div>

  <script>
    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
    const BUCKET_NAME = "photos";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const dropzone = document.getElementById("dropzone");
    const chooseBtn = document.getElementById("chooseBtn");
    const fileInput = document.getElementById("fileInput");
    const statusEl = document.getElementById("status");
    const allLinksEl = document.getElementById("allLinks");
    const resultsEl = document.getElementById("results");
    const copyAllBtn = document.getElementById("copyAllBtn");

    let links = [];

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function updateLinksBox() {
      allLinksEl.value = links.join("\n");
    }

    function safeFileName(name) {
      const ext = name.includes(".") ? name.substring(name.lastIndexOf(".")) : "";
      const base = name.replace(/\.[^/.]+$/, "");
      const cleaned = base
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return `${cleaned || "image"}-${Date.now()}-${Math.floor(Math.random() * 100000)}${ext}`;
    }

    function addResultCard(originalName, url) {
      const item = document.createElement("div");
      item.className = "item";
      item.innerHTML = `
        <img class="preview" src="${url}" alt="${originalName}">
        <div><strong>${originalName}</strong></div>
        <div style="margin:8px 0;">
          <a href="${url}" target="_blank">${url}</a>
        </div>
        <button type="button">Copy link</button>
      `;
      item.querySelector("button").addEventListener("click", async () => {
        await navigator.clipboard.writeText(url);
        alert("Link copied");
      });
      resultsEl.prepend(item);
    }

    async function uploadFiles(fileList) {
      const files = [...fileList].filter(file => file.type.startsWith("image/"));

      if (!files.length) {
        alert("Please choose image files only.");
        return;
      }

      setStatus(`Uploading ${files.length} file(s)...`);

      for (const file of files) {
        const newName = safeFileName(file.name);
        const path = `uploads/${newName}`;

        const { error: uploadError } = await supabaseClient
          .storage
          .from(BUCKET_NAME)
          .upload(path, file, {
            cacheControl: "3600",
            upsert: false
          });

        if (uploadError) {
          console.error(uploadError);
          setStatus(`Failed: ${file.name}`);
          continue;
        }

        const { data } = supabaseClient
          .storage
          .from(BUCKET_NAME)
          .getPublicUrl(path);

        const publicUrl = data.publicUrl;

        links.push(publicUrl);
        updateLinksBox();
        addResultCard(file.name, publicUrl);
      }

      setStatus("Done");
    }

    chooseBtn.addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", async (e) => {
      await uploadFiles(e.target.files);
      fileInput.value = "";
    });

    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.classList.add("dragover");
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.classList.remove("dragover");
    });

    dropzone.addEventListener("drop", async (e) => {
      e.preventDefault();
      dropzone.classList.remove("dragover");
      await uploadFiles(e.dataTransfer.files);
    });

    copyAllBtn.addEventListener("click", async () => {
      if (!links.length) {
        alert("No links yet.");
        return;
      }
      await navigator.clipboard.writeText(links.join("\n"));
      alert("All links copied");
    });
  </script>
</body>
</html>
